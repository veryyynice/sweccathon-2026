name: Deploy showcase to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "showcase/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages and verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for newer pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on this repo with build_type=workflow on first run.
          enablement: true

      - name: Upload showcase artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: showcase

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
